# Golden-trace regression: replay a recorded trace through the CURRENT pipeline and assert it
# still matches its recorded oracle (exit 0). OFFLINE + deterministic — no live server, no mic,
# no judge. See docs/design/trace_system_testing.md.
#
#   make replay        # the deterministic trace-system tier
#   make replay-judge  # the trace-ux tier (LLM replies graded by DeepSeek)
#
# Reuses the shared cli_provider (no new locveil-eval code): a golden-trace case is just a console
# invocation of locveil-voice-replay-trace whose exit code is the verdict — 0 = matched the oracle, 2 = drift.
# Replay builds the real pipeline (models must be present), so this is kept SEPARATE from `make cli`
# (which brags zero prerequisites). The replay tool normalizes volatile fields (timestamps) before
# diffing, so a deterministic handler stays a stable green golden.

description: locveil-voice — golden-trace regression (offline replay of recorded traces)

prompts:
  - '{{cmd}}'

providers:
  - id: file://../../locveil-commons/eval/eval_commons/providers/cli_provider.py
    label: replay
    config:
      cwd: ..                 # run locveil-voice-replay-trace from the repo root
      return_mode: full       # JSON {stdout, stderr, exit_code, duration_ms}
      timeout_s: 180          # replay builds the full pipeline (~15s)

tests:
  # ── trace-system tier: deterministic (ASR / cheap NLU / rule-handlers) → assert exit 0. ──────
  # Golden path + config are language-partitioned (I18N-5): traces/{{env.EVAL_LANG}}/… replayed under
  # the run's config ({{env.LOCVEIL_VOICE_CONFIG_FILE}}, the deployment the golden represents — D-4 CONFIG axis).
  - description: RU golden — «поставь таймер на 10 минут» still sets the timer
    metadata: { kind: trace-system, language: ru }
    vars:
      cmd: "locveil-voice-replay-trace -t eval/traces/{{env.EVAL_LANG}}/timer_set_10min.json --config {{env.LOCVEIL_VOICE_CONFIG_FILE}}"
    assert:
      - { type: javascript, value: "JSON.parse(output).exit_code === 0" }   # 0 = matched the oracle

  # English golden (I18N-8): traces/en/timer_set_10min.json, an audio-input trace recorded from a live
  # embedded-armv7-en run (Moonshine ASR → timer). Runs under EVAL_LANG=en (make replay
  # CONFIG=embedded-armv7-en); replays offline and matches its oracle.
  - description: EN golden — "set a timer for ten minutes" still sets the timer
    metadata: { kind: trace-system, language: en }
    vars:
      cmd: "locveil-voice-replay-trace -t eval/traces/{{env.EVAL_LANG}}/timer_set_10min.json --config {{env.LOCVEIL_VOICE_CONFIG_FILE}}"
    assert:
      - { type: javascript, value: "JSON.parse(output).exit_code === 0" }

  # ── trace-ux tier (kind=ux/trace-ux): LLM replies are non-deterministic, so they are NOT
  #    exit-code asserted — replay with --record-out and judge the reply (DeepSeek). None yet;
  #    add one once an LLM-path golden is curated (and BUG-1 is fixed for natural-number timers).
