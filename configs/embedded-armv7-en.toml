# ============================================================
# IRENE — WB7 (armv7l) SATELLITE-SERVER — ENGLISH (I18N-4)
# ============================================================
# English deployment variant of embedded-armv7.toml. Only the language-bearing fields differ:
# ASR = sherpa_moonshine + moonshine-tiny-en (offline English, 43 MB merged .ort — I18N-2; the
# earlier streaming zipformer-en-20M was rejected: online models drop the head of bounded commands),
# TTS = piper voice "amy" (en_US — I18N-3), and default_language flipped to "en" everywhere with
# auto-detect OFF (language is fixed per deployment; the voice pipeline is monolingual — see
# docs/design/multilingual_deployment.md). All other settings mirror the Russian armv7 config.
# ============================================================
# Role: the BACK HALF of the voice pipeline. The ESP32 satellites own mic capture, VAD,
# wake-word/voice-trigger and audio playback; this server receives a gated, segmented
# utterance and runs ASR → NLU → intent → TTS. The TTS reply is streamed back to the device
# over the output seam (RemoteAudioOutput / /ws/audio/reply) once the ESP32 transport (QUAL-45)
# registers it — NOT through the local `audio` component, which is DISABLED here (no speaker on WB7;
# the workflow's local-playout path no-ops when `audio` is absent).
#
# Torch-free, armv7-viable stack (canonical matrix: docs/design/torch_free_armv7_voice.md §5):
#   ASR = sherpa_onnx + vosk-small  (Whisper-small barred by WB7 RAM; Kaldi `vosk` has no armv7 wheel)
#   TTS = piper (direct, espeak-ng stress)  — RUAccent/vosk_tts are 64-bit-only (the armv7 ORT wall)
#   NLU = keyword → llm cascade  (no spaCy — no armv7 wheel; LLM classifier recovers fuzzy commands)
#
# Baked default config for the armv7 image. Co-hosted with locveil-bridge + wb-mqtt-ui on a 4-core
# Cortex-A7 / ~712 MB free — hence num_threads=2 and lean providers.
#
# BUILD-TIME LEAN-DOWN (once the system is stable and traces are no longer needed): set
#   components.monitoring = false  and  components.nlu_analysis = false
# (and drop their [monitoring]/[nlu_analysis] sections) to reclaim RAM. Kept ON for now to collect
# traces (QUAL-53 — analysing why utterances fall through to the LLM tier).

name = "Irene"
debug = false
log_level = "INFO"

# Top-level language / runtime. `default_language` is the canonical source of truth (the legacy
# `language` key is kept for back-compat). English-only deployment → supported_languages = ["en"].
language = "en"
default_language = "en"
supported_languages = ["en"]
max_concurrent_commands = 10
command_timeout_seconds = 30.0
context_timeout_minutes = 30

# ============================================================
# SYSTEM CAPABILITIES — Hardware & Services
# ============================================================
[system]
microphone_enabled = false      # No local mic — the ESP32 captures + gates audio (so NO server VAD)
audio_playback_enabled = false  # No local speaker — TTS goes back to the device via the output seam
web_api_enabled = true          # WS/HTTP API for the ESP32 transport + control
web_port = 8080
metrics_enabled = false
metrics_port = 9090

# ============================================================
# INPUT SOURCES
# ============================================================
[inputs]
microphone = false              # ESP32 owns capture
web = true                      # ESP32 transport + Web API
cli = false
default_input = "web"

[inputs.web_config]
enabled = true
websocket_enabled = true
rest_api_enabled = true

# ============================================================
# OUTPUT CHANNELS (defaults made explicit; ARCH-8 bridge surface)
# ============================================================
[outputs]
console = true                      # Console (terminal) text output (CLI channel)
web_push = true                     # Browser push channel (/ws/output) for deferred results

[outputs.bridge]
# Smart-home actuation via locveil-bridge (ARCH-8). ON: the bridge runs on this controller
# (BUILD-27). `localhost` is correct because the container shares the host network, exactly as
# the bridge's own container does — see ops/docker-compose.yml. A failed startup catalog pull is
# non-fatal; the lazy refresh retries on the first device-resolution miss.
enabled = true
base_url = "http://localhost:8000"  # locveil-bridge REST API
timeout_seconds = 20.0

# ============================================================
# COMPONENT ENABLEMENT
# ============================================================
[components]
asr = true                      # sherpa_onnx (vosk-small)
nlu = true                      # keyword → llm cascade
intent_system = true            # essential
tts = true                      # piper
llm = true                      # powers the NLU classifier fallback + conversation (deepseek)
text_processor = true
audio = false                   # no local speaker — TTS reply rides the output seam, not this component
voice_trigger = false           # ESP32 owns wake-word
configuration = true            # Web API config endpoints
monitoring = true               # kept for traces (see build-time lean-down above)
nlu_analysis = true             # kept for traces (see build-time lean-down above)

# ============================================================
# ASR — sherpa-onnx (the only armv7 ASR; no torch, no Kaldi)
# ============================================================
[asr]
enabled = true
default_provider = "sherpa_moonshine"
fallback_providers = []
default_language = "en"

[asr.providers.sherpa_moonshine]
enabled = true
model = "moonshine-tiny-en"        # offline Moonshine, 43 MB merged .ort (I18N-2); WB7-proven RTF ~0.7,
default_language = "en"            # 134 MB RSS. Offline → batch branch → dodges BUG-13. Needs sherpa
sample_rate = 16000               # >=1.12 (armv7 pin 1.12.36 + the BUG-14 onnxruntime patch/bookworm).
num_threads = 2                    # leave 2 of the 4 A7 cores for the co-hosted locveil-bridge/ui
decoding_method = "greedy_search"
preload_models = true              # pay the graph-init at boot, off the first-utterance path

# ============================================================
# TTS — Piper direct (VITS via sherpa-onnx; espeak-ng stress)
# ============================================================
[tts]
enabled = true
default_provider = "piper"
fallback_providers = ["console"]

[tts.providers.piper]
enabled = true
voice = "amy"                      # en_US female (I18N-3)
language = "en"
speaker_id = 0
speed = 1.0
num_threads = 0                    # 0 = auto → 2 on armv7 (shared InferencePolicy)
preload_models = true

[tts.providers.console]
enabled = true                     # fallback (debug text output)
color = "blue"
style = "console"
format = "txt"

# ============================================================
# AUDIO — DISABLED (no local speaker on WB7). The TTS reply to the ESP32 rides the
# output seam (RemoteAudioOutput); the workflow's local-playout path no-ops without it.
# ============================================================
[audio]
enabled = false

# ============================================================
# LLM — deepseek (NLU classifier fallback + conversation); console floor
# Requires DEEPSEEK_API_KEY at runtime; degrades gracefully offline
# (keyword NLU still works; conversation falls to the console floor).
# ============================================================
[llm]
enabled = true
default_provider = "deepseek"
fallback_providers = ["console"]

[llm.providers.deepseek]
enabled = true
api_key = "${DEEPSEEK_API_KEY:-}"
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
max_tokens = 8000
context_window = 64000
timeout = 30

[llm.providers.console]
enabled = true                     # offline floor — never crashes when no network/key

# ============================================================
# VOICE TRIGGER — off (ESP32 wakes on-device, then streams; skip_wake_word)
# ============================================================
[voice_trigger]
enabled = false
confidence_threshold = 0.8
buffer_seconds = 1.0
timeout_seconds = 5.0

# ============================================================
# VAD — off (no local mic; the ESP32 delivers bounded utterances)
# ============================================================
[vad]
enabled = false
default_provider = "energy"

# ============================================================
# NLU — keyword → llm cascade (no spaCy on armv7)
# ============================================================
[nlu]
enabled = true
default_provider = "hybrid_keyword_matcher"
confidence_threshold = 0.7
fallback_intent = "conversation.general"
provider_cascade_order = ["hybrid_keyword_matcher", "llm"]   # spaCy dropped — no armv7 wheel
max_cascade_attempts = 4
cascade_timeout_ms = 200
cache_recognition_results = false
cache_ttl_seconds = 300
auto_detect_language = false        # English-only deployment — language is fixed by config (I18N-4)
language_detection_confidence_threshold = 0.8
persist_language_preference = true

[nlu.providers.hybrid_keyword_matcher]
enabled = true
default_language = "en"
confidence_threshold = 0.7
fuzzy_enabled = true
fuzzy_threshold = 0.8
pattern_confidence = 0.9
case_sensitive = false
normalize_unicode = true
cache_fuzzy_results = true
max_fuzzy_keywords_per_intent = 50
min_pattern_length = 2

[nlu.providers.spacy_nlu]
enabled = false                    # no armv7 wheel — the LLM tier replaces it here

[nlu.providers.llm]
enabled = true                     # last-resort classifier for fuzzy commands (QUAL-50/51)
confidence_threshold = 0.7
max_phrases_per_intent = 3
# model / provider omitted → uses the [llm] default chain (deepseek)

# ============================================================
# TEXT PROCESSING
# ============================================================
[text_processor]
enabled = true
stages = ["asr_output", "tts_input"]     # the two real stages (informational; chains below)

[text_processor.normalizers.numbers]
enabled = true                           # digits -> words, for SYNTHESIS
# TTS-only (BUG-23): on asr_output this fought the words->digits pre-NLU normalization and
# corrupted alphanumerics ("hdmi1" -> "hdmiодин", "25" -> spelled words -> mis-reparsed).
stages = ["tts_input"]
language = "en"                          # QUAL-38: spell numbers in the deployment language

[text_processor.normalizers.prepare]
enabled = true                           # symbol->word normalization for SYNTHESIS
stages = ["tts_input"]                   # TTS-only (BUG-3)
# EN deployment: NEVER transliterate — the voice is English; Latin->Cyrillic would corrupt
# every spoken reply. (The RU profiles keep it on for Latin words inside Russian speech.)
latin_to_cyrillic = false
symbol_replacement = true
language = "en"

# ============================================================
# INTENT SYSTEM (essential)
# ============================================================
[intent_system]
enabled = true
confidence_threshold = 0.7
fallback_intent = "conversation.general"

[intent_system.handlers]
enabled = ["conversation", "greetings", "timer", "datetime", "system", "text_enhancement_handler", "smart_home", "report"]
disabled = []
auto_discover = true
discovery_paths = ["irene.intents.handlers"]

[intent_system.handlers.asset_validation]
strict_mode = true
validate_spacy_patterns = false
validate_json_schema = true

[intent_system.handlers.conversation]
session_timeout = 1800
max_sessions = 50
max_context_length = 10
default_conversation_confidence = 0.6

[intent_system.handlers.timer]
min_seconds = 1
max_seconds = 86400

[intent_system.handlers.datetime]
timezone = ""
date_format = "%Y-%m-%d"
time_format = "%H:%M:%S"

[intent_system.handlers.greetings]
personalized = true
context_aware = true

[intent_system.handlers.system]
allow_shutdown = false
allow_restart = false
info_detail_level = "basic"

# ============================================================
# MONITORING — kept for traces (disable at build time once stable; see header)
# ============================================================
[monitoring]
enabled = true
metrics_enabled = true
dashboard_enabled = false          # headless satellite — no web dashboard
notifications_enabled = false
debug_tools_enabled = true
memory_management_enabled = true
notifications_default_channel = "log"
metrics_monitoring_interval = 300
metrics_retention_hours = 24
memory_cleanup_interval = 1800
memory_aggressive_cleanup = false
debug_auto_inspect_failures = true
debug_max_history = 1000
analytics_dashboard_enabled = false

# ============================================================
# NLU ANALYSIS — kept for traces (disable at build time once stable; see header)
# ============================================================
[nlu_analysis]
enabled = true

[nlu_analysis.conflict_detector]
blocker_threshold = 0.8
warning_threshold = 0.6
info_threshold = 0.4

[nlu_analysis.scope_analyzer]
cross_domain_threshold = 0.7
breadth_threshold = 0.8

[nlu_analysis.report_generator]
max_suggestions_per_conflict = 5
include_technical_details = true

[nlu_analysis.hybrid_analyzer]
fuzzy_threshold = 0.8
pattern_confidence = 0.9
detect_keyword_collisions = true
detect_pattern_explosion = true
detect_performance_issues = true

[nlu_analysis.performance]
max_analysis_time_ms = 5000.0
max_concurrent_analyses = 3
enable_caching = true
cache_ttl_seconds = 300

[nlu_analysis.languages]
supported_languages = ["ru", "en"]
language_detection_threshold = 0.8

# ============================================================
# WORKFLOWS — unified voice assistant (back-half stages only)
# ============================================================
[workflows]
enabled = ["unified_voice_assistant"]
default = "unified_voice_assistant"

[workflows.unified_voice_assistant]
voice_trigger_enabled = false      # ESP32 owns wake-word
asr_enabled = true
text_processing_enabled = true
nlu_enabled = true
intent_execution_enabled = true
llm_enabled = true
tts_enabled = true
audio_enabled = false              # no local playback — reply rides the output seam
monitoring_enabled = true
sample_rate = 16000
channels = 1
validate_audio_compatibility = true
enable_vad_processing = false      # no server VAD — utterances arrive already segmented
default_source = "voice"
default_language = "en"
session_timeout_minutes = 30

[workflows.unified_voice_assistant.audio_validation]
enabled = true
fatal_on_conflicts = true
auto_resolve_defaults = true
log_resolution_details = true

# ============================================================
# TRACE — per-request utterance traces (ARCH-19). OFF by default (CPU/disk overhead on the WB7).
# Flip enabled=true to collect traces for QUAL-53 (analysing why utterances fall through to the LLM
# tier) — but note that analysis needs the cascade trace enriched with per-provider attempts first.
# Can also be toggled per-run with the runner's --trace flag.
# ============================================================
[trace]
enabled = false
capture_level = "utterance"        # "utterance" | "segmenter" | "raw" (raw = heaviest)

# ============================================================
# ASSET MANAGEMENT
# ============================================================
[assets]
auto_create_dirs = true
cleanup_on_startup = false
# Paths via env: IRENE_ASSETS_ROOT (default ~/.cache/irene)
