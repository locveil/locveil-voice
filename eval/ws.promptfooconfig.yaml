# System tests: the shipped streaming-ASR endpoint /ws/audio (ARCH-10, irene/runners/webapi_router.py).
# PURE YAML — all execution logic lives in ../../eval-commons. Run via the Makefile so the axes and the
# project venv are wired for you:
#
#   make ws  TARGET=local  CONFIG=embedded-armv7      # Russian suite (EVAL_LANG=ru derived)
#   make ws  TARGET=local  CONFIG=embedded-armv7-en   # English suite (EVAL_LANG=en derived)
#   make ux  TARGET=local  CONFIG=...                 # only the DeepSeek-judged UX cases (needs DEEPSEEK_API_KEY)
#
# THREE external axes, none baked into a case: TARGET (endpoint, {{env.WS_AUDIO_URL}}), CONFIG (which
# SUT config runs), EVAL_LANG (which language — fixtures/{{env.EVAL_LANG}}/… + the metadata.language
# filter the Makefile applies). Cases are duplicated per language and tagged `language`; a run selects
# one. Keep the two languages' cases in lockstep (same scenarios).

description: wb-mqtt-voice — streaming ASR + conversational UX over /ws/audio (ru + en)

# The rendered prompt handed to the provider is just the audio fixture path for each case.
prompts:
  - '{{audio}}'

providers:
  - id: file://../../eval-commons/eval_commons/providers/ws_audio_provider.py
    label: ws-audio
    config:
      ws_url: "{{ env.WS_AUDIO_URL | default('ws://localhost:6000/ws/audio') }}"
      # Room name is echoed back in the "no devices in session <room>" failure reply, so it must match
      # the run language (else an otherwise-English reply carries a Russian word and fails the rubric).
      room_name: "{{ env.EVAL_ROOM | default('Кухня') }}"
      sample_rate: 16000
      mode: streaming
      return_mode: full          # output = JSON {transcript, response_text, intent_name, success, ...}

# Every llm-rubric / g-eval assertion is graded by DeepSeek, wired once here.
defaultTest:
  options:
    provider:
      file://../../eval-commons/shared/deepseek-judge.yaml

tests:
  # ═══════════════════════════ RUSSIAN (language: ru) ═══════════════════════════
  # ── 1. ASR transcript accuracy (deterministic, WER via jiwer) ──────────────────
  - description: RU ASR accuracy — «поставь таймер на десять минут»
    metadata: { kind: system, language: ru }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
      reference: поставь таймер на десять минут
      wer_threshold: 0.15
    assert:
      - type: python
        value: file://../../eval-commons/eval_commons/assertions/wer_scorer.py

  # ── 2. Intent recognition (deterministic, parse the full-JSON output) ──────────
  - description: RU Intent — timer set is recognized
    metadata: { kind: system, language: ru }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
    assert:
      - type: is-json
      - type: javascript
        value: JSON.parse(output).intent_name === 'timer.set' && JSON.parse(output).success === true

  # ── 3. Conversational UX (DeepSeek judge; co-equal rubric, cf. shared/rubrics/ru-ux.yaml) ──
  - description: RU UX — assistant confirms the timer in natural Russian
    metadata: { kind: ux, language: ru }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          Ответ оценивается как подтверждение выполненного действия. Оцени как пройдено ТОЛЬКО
          если одновременно выполнены ВСЕ условия: (1) ответ полностью на русском языке, без
          англоязычных слов или фраз; (2) ясно и однозначно подтверждено, что запрошенное
          действие выполнено (например «готово», «таймер установлен»), без неоднозначности об
          успехе; (3) нет сырой технической ошибки или трейсбека. Технические идентификаторы
          устройств оценивать не нужно. Если хотя бы одно условие не выполнено — оцени как НЕ пройдено.

  # ── 4. Graceful-failure UX (unreachable device) ────────────────────────────────
  - description: RU UX — polite, human-readable failure when a device is unreachable
    metadata: { kind: ux, language: ru }
    vars:
      # `reference` is the line to SPEAK when recording this fixture (the recorder reads it); this is a
      # judge case, so nothing asserts WER. Target a device unreachable in the SUT's config.
      audio: fixtures/{{env.EVAL_LANG}}/light_unreachable.wav
      reference: включи свет в гараже
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          Ответ оценивается как сообщение о невозможности выполнить действие. Оцени как пройдено
          ТОЛЬКО если одновременно выполнены ВСЕ условия: (1) ответ полностью на русском языке,
          без англоязычных слов или фраз; (2) тон вежливый и доброжелательный, без грубости;
          (3) нет сырой технической ошибки, кода ошибки или трейсбека; (4) проблема объяснена
          понятно и человекочитаемо, по возможности предложен следующий шаг. Если хотя бы одно
          условие не выполнено — оцени как НЕ пройдено.

  # ═══════════════════════════ ENGLISH (language: en) ═══════════════════════════
  # Same four scenarios, English audio/reference/rubric. Fixtures pending recording (fixtures/en/*).
  # ── 1. ASR transcript accuracy ─────────────────────────────────────────────────
  - description: EN ASR accuracy — "set a timer for ten minutes"
    metadata: { kind: system, language: en }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
      reference: set a timer for ten minutes
      wer_threshold: 0.15
    assert:
      - type: python
        value: file://../../eval-commons/eval_commons/assertions/wer_scorer.py

  # ── 2. Intent recognition (intent names are language-agnostic → same timer.set) ─
  - description: EN Intent — timer set is recognized
    metadata: { kind: system, language: en }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
    assert:
      - type: is-json
      - type: javascript
        value: JSON.parse(output).intent_name === 'timer.set' && JSON.parse(output).success === true

  # ── 3. Conversational UX (co-equal rubric, cf. shared/rubrics/en-ux.yaml#confirms_action_en) ──
  - description: EN UX — assistant confirms the timer in natural English
    metadata: { kind: ux, language: en }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/timer_10min.wav
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          The reply is evaluated as a confirmation that the requested action was carried out. Rate as
          passed ONLY if ALL of the following hold: (1) the reply is entirely in English, with no
          foreign-language words or phrases; (2) it clearly and unambiguously confirms the requested
          action was done (e.g. "done", "timer set"), with no ambiguity about success; (3) there is no
          raw technical error or traceback. Device technical identifiers need not be evaluated. If any
          condition is not met, rate as NOT passed.

  # ── 4. Graceful-failure UX ──────────────────────────────────────────────────────
  - description: EN UX — polite, human-readable failure when a device is unreachable
    metadata: { kind: ux, language: en }
    vars:
      audio: fixtures/{{env.EVAL_LANG}}/light_unreachable.wav
      reference: turn on the light in the garage
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          The reply is evaluated as a message that the action cannot be performed. Rate as passed ONLY
          if ALL of the following hold: (1) the reply is entirely in English, with no foreign-language
          words or phrases; (2) the tone is polite and friendly, without rudeness; (3) there is no raw
          technical error, error code, or traceback; (4) the problem is explained clearly and
          human-readably, ideally with a suggested next step. If any condition is not met, rate as NOT passed.
