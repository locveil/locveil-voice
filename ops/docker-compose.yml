# Irene on a Wirenboard controller — deploy = pull, not build (BUILD-10, design D-5).
# Lives in a git checkout of this repo on the controller; ./update.sh keeps the assets
# mount in sync with the checkout and pulls fresh images. See INSTALL.md.
#
# Rollback: pin `image:` to a vYYYYMMDD-<sha> tag (see GHCR package page) and re-run
# `docker compose up -d`. English deployment: switch the image to the `-en` variant
# (ghcr.io/droman42/wb-mqtt-voice-armv7-en) — the language is baked into the image.

services:
  irene:
    image: ghcr.io/droman42/wb-mqtt-voice-armv7:latest
    container_name: wb-mqtt-voice
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # The runtime tree lives on /mnt/data (the clone on /mnt/sdcard is only the
      # delivery vehicle — same split as the sibling mqtt-bridge-config). assets/ is
      # the assets root: git-owned content (rsynced in by update.sh) + downloaded
      # models, cache, traces, and durable state (state/ — timers survive restarts).
      - /mnt/data/mqtt-voice-config/assets:/app/assets
      # Runner file logs (logs/irene.log + rotated timestamps). Unmounted they would
      # accumulate in the container's writable layer — flash wear + lost on recreate.
      - /mnt/data/mqtt-voice-config/logs:/app/logs
    environment:
      # Secrets reach the container via an `ops/.env` file next to this compose file
      # (chmod 600 — see INSTALL.md "Secrets"). Compose reads .env for BOTH start
      # paths: the systemd unit and update.sh run compose from this directory.
      # Empty values are fine: the LLM tier and problem reporting degrade to off.
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      IRENE_REPORTS_TOKEN: "${IRENE_REPORTS_TOKEN:-}"
    # WB7 has 1 GB RAM shared with the bridge and system services; the ASR/TTS models are
    # the big consumers. Tune on hardware bring-up.
    mem_limit: 800m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # The configuration editor (donation/config editing). Deliberately NOT part of the
  # standard controller deployment (design D-4) — enable on demand:
  #   docker compose --profile ui up -d
  ui:
    image: ghcr.io/droman42/wb-mqtt-voice-ui:latest
    container_name: wb-mqtt-voice-ui
    profiles: ["ui"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Empty = the app talks to Irene on the same host the page is served from, :8080.
      API_BASE_URL: ""
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
