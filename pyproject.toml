greetings = "irene.intents.handlers.greetings:GreetingsIntentHandler"
timer = "irene.intents.handlers.timer:TimerIntentHandler"
datetime = "irene.intents.handlers.datetime:DateTimeIntentHandler"
system = "irene.intents.handlers.system:SystemIntentHandler"
random_handler = "irene.intents.handlers.random_handler:RandomIntentHandler"
system_service_handler = "irene.intents.handlers.system_service_handler:SystemServiceIntentHandler"
audio_playback_handler = "irene.intents.handlers.audio_playback_handler:AudioPlaybackIntentHandler"
translation_handler = "irene.intents.handlers.translation_handler:TranslationIntentHandler"
text_enhancement_handler = "irene.intents.handlers.text_enhancement_handler:TextEnhancementIntentHandler"
