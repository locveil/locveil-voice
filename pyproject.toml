# NOTE: Builtin plugins section removed - no builtin plugins in unified architecture
# All functionality moved to intent handlers with JSON donations

[project.entry-points."irene.runners"]
cli = "irene.runners.cli:CLIRunner"
voice = "irene.runners.voice_runner:VoiceRunner"
webapi = "irene.runners.webapi_runner:WebAPIRunner"

# Pull torch/torchaudio from the CPU-only wheel index. The only torch consumer is the x86_64 standalone
# (Silero TTS + Whisper ASR), and it runs device="cpu" — the default PyPI torch drags in ~3.4 GB of unused
# NVIDIA CUDA + Triton wheels. The CPU wheels carry none of that (confirmed: image 6.44 GB → 3.16 GB;
# triton ~688 MB still rides in via openai-whisper — see review CR-A1/triton follow-up). Satellites
# ship no torch at all. The index is `explicit` + scoped via [tool.uv.sources] so it is consulted ONLY for
# torch/torchaudio; a non-explicit index would let uv's first-index rule cap pytorch's stale mirrors of
# common deps (urllib3, types-requests, …) and break resolution. torch reaches the build only through the
# `tts-silero` / `advanced-asr` EXTRAS (`uv pip install .[…]`), and the pip interface DOES honor
# [tool.uv.sources] for the project's own optional-deps — so the CPU pin applies with no Dockerfile step.
# (It is NOT honored for loose `-r requirements` specs, which is why torch must stay in an extra, not pip-specs.)
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchaudio = { index = "pytorch-cpu" }

[tool.setuptools.packages.find]
where = ["."]
include = ["irene*"]
# Fixed: Removed references to non-existent directories
exclude = []

# Fixed: Removed duplicate dev-dependencies section
[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
# Fixed: Removed references to non-existent directories
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.pytest.ini_options]
testpaths = ["irene/tests", "tools"]
# pytest-asyncio: treat bare `async def test_*` as asyncio tests (the suite predates
# pytest-asyncio's strict default; without this ~23 async tests error as "not natively supported").
asyncio_mode = "auto"
filterwarnings = [
    # Pydantic V1-style @validator / class Config across the config + donation models is known
    # tech debt (separate migration); silence the deprecation flood so real signal is visible.
    "ignore::pydantic.warnings.PydanticDeprecatedSince20",
]

# ARCH-5: Hexagonal import contracts (enforced via `lint-imports` and irene/tests/test_import_contracts.py).
# Encodes the rules ARCH-1..4 established so the architecture can't silently regress.
[tool.importlinter]
root_package = "irene"

[[tool.importlinter.contracts]]
name = "Domain (intents) depends on nothing outward (ARCH-1)"
type = "forbidden"
source_modules = ["irene.intents"]
forbidden_modules = [
    "irene.components",
    "irene.workflows",
    "irene.providers",
    "irene.web_api",
    "irene.runners",
    "irene.inputs",
    "irene.outputs",
]
# QUAL-24 (DONE): the `intents.handlers.* -> core.engine` get_core() escape hatch was removed.
# Handlers now depend on domain-owned capability ports (irene/intents/ports.py); the application
# injects the real components inward. No ignore_imports — the domain-clean rule enforces with no hatch.

[[tool.importlinter.contracts]]
name = "Config has no upward imports (ARCH-2)"
type = "forbidden"
source_modules = ["irene.config"]
forbidden_modules = [
    "irene.core",
    "irene.components",
    "irene.providers",
    "irene.workflows",
    "irene.web_api",
    "irene.runners",
    "irene.inputs",
    "irene.outputs",
    "irene.intents",
]

[[tool.importlinter.contracts]]
name = "Components (application) don't import delivery (ARCH-3)"
type = "forbidden"
source_modules = ["irene.components"]
forbidden_modules = [
    "irene.web_api",
    "irene.runners",
    "irene.inputs",
    "irene.outputs",
]

[[tool.importlinter.contracts]]
name = "Only nlu_analysis may import the analysis tooling (ARCH-3)"
type = "forbidden"
source_modules = ["irene.components"]
forbidden_modules = ["irene.analysis"]
ignore_imports = [
    "irene.components.nlu_analysis_component -> irene.analysis.*",
]

[[tool.importlinter.contracts]]
name = "Adapters (providers) don't import application (ARCH-4)"
type = "forbidden"
source_modules = ["irene.providers"]
forbidden_modules = [
    "irene.components",
    "irene.workflows",
]

[[tool.importlinter.contracts]]
name = "Provider categories are independent of each other (ARCH-4)"
type = "independence"
modules = [
    "irene.providers.asr",
    "irene.providers.tts",
    "irene.providers.audio",
    "irene.providers.llm",
    "irene.providers.nlu",
    "irene.providers.voice_trigger",
    "irene.providers.vad",
    "irene.providers.text_processor",
]

[[tool.importlinter.contracts]]
# ARCH-6/SCC-2: the input PORT module must not import its concrete adapters (no base⇄subclass cycle,
# no service-locator). The InputManager orchestrator lives in irene.inputs.manager, which is the input
# layer's composition point and legitimately depends outward on the adapters.
name = "Input port does not import its adapters (ARCH-6 / SCC-2)"
type = "forbidden"
source_modules = ["irene.inputs.base"]
forbidden_modules = [
    "irene.inputs.cli",
    "irene.inputs.microphone",
    "irene.inputs.web",
    "irene.inputs.manager",
]

[[tool.importlinter.contracts]]
# ARCH-11: core depends only on its own ports (irene.core.interfaces), never outward on the
# application/delivery/adapter layers. This REVOKES the ARCH-5 reclassification that left the
# core->{inputs,workflows,components} composition-root edges unenforced. The edges were inverted in
# ARCH-11 S1-S3 (input port + Component/Workflow ports lifted into irene.core.interfaces; all manager
# construction moved to the composition root irene.runners.composition.build_core). NB: irene.core.*
# (e.g. irene.core.components, irene.core.workflow_manager) is NOT irene.components/irene.workflows.
name = "Core does not import the outer layers (ARCH-11)"
type = "forbidden"
source_modules = ["irene.core"]
forbidden_modules = [
    "irene.inputs",
    "irene.outputs",
    "irene.workflows",
    "irene.components",
]

[[tool.importlinter.contracts]]
# ARCH-28: the durable-action store is a SEAM with exactly three legitimate clients — the F&F
# launch/completion choke point (intents.handlers.base), the startup reconciler (core.engine),
# and the notification redelivery queue (core.notifications). Everything else uses those seams:
# delivery layers drain via NotificationService, application services launch via `durable=`,
# observability reads the runtime registry — never the persisted store directly. This contract
# pins that: no application/delivery/adapter layer may import the store module.
name = "Durable-action store is reached only through its seam (ARCH-28)"
type = "forbidden"
source_modules = [
    "irene.components",
    "irene.workflows",
    "irene.providers",
    "irene.web_api",
    "irene.runners",
    "irene.inputs",
    "irene.outputs",
]
forbidden_modules = ["irene.core.durable_actions"]
# The three seam edges are the sanctioned gateways — ignoring them here means a chain that
# goes THROUGH the seam (e.g. webapi_router -> core.notifications -> durable_actions, the
# drain call) doesn't count, while a NEW direct import from any outer layer still fails.
ignore_imports = [
    "irene.intents.handlers.base -> irene.core.durable_actions",
    "irene.core.engine -> irene.core.durable_actions",
    "irene.core.notifications -> irene.core.durable_actions",
]

[[tool.importlinter.contracts]]
# ARCH-12: utils is the foundational kernel — it must not reach UP into any application/config/delivery
# layer. The two residual upward edges were removed: utils.vad->core.metrics (a dead import) and
# utils.logging->config.models (the LogLevel enum, relocated INTO utils.logging and re-exported by
# config.models). NB: config.models now depends on utils.logging (downward) — that is the intended
# direction and is allowed.
name = "Utils (foundation) depends on nothing upward (ARCH-12)"
type = "forbidden"
source_modules = ["irene.utils"]
forbidden_modules = [
    "irene.core",
    "irene.config",
    "irene.components",
    "irene.intents",
    "irene.workflows",
    "irene.inputs",
    "irene.outputs",
    "irene.providers",
    "irene.runners",
    "irene.web_api",
]

[tool.mypy]
# Basic settings - detailed configuration in mypy.ini (matching wb-mqtt-bridge)
python_version = "3.11"

# [tool.pyright] removed (QUAL-4): pyrightconfig.json is the single source of truth
# for the standard-mode type gate. Two configs drifted; the JSON one wins when present.

[tool.setuptools.dynamic]
version = {attr = "irene.__version__.__version__"}
