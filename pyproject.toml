[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "irene-voice-assistant"
dynamic = ["version"]
description = "Irene - Modern async voice assistant with optional components. Supports plugins and flexible deployment."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # Core async framework (minimal dependencies)
    "python-dateutil>=2.8.0", # Fixed: Updated to be compatible with pandas/matplotlib
    # Configuration and validation (now required)
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "tomli-w>=1.0.0", # For TOML writing support
    "tomlkit>=0.12.0", # For comment-preserving TOML round-trip editing
    # Logging and utilities
    "termcolor>=1.1.0",
    "pyyaml>=6.0",  # used in core runtime (webapi_router, intent_asset_loader, NLU) — was only transitive
    # NLU fuzzy matching (JSON donation system requirement)
    "rapidfuzz>=3.0.0",
    "jsonschema>=4.25.0",
    "prompt-toolkit>=3.0.51",
    "aiohttp>=3.12.15",
    "numpy<2",
]

[project.optional-dependencies]
# Audio input — split per-provider (B): the vosk ASR provider + the sounddevice audio backend
# (also reused by the microphone input). Umbrella `audio-input` kept for back-compat.
asr-vosk = [
    "vosk>=0.3.45",
]
audio-sounddevice = [
    "sounddevice>=0.5.0",
    "soundfile>=0.13.0",
]
audio-input = [
    "irene-voice-assistant[asr-vosk,audio-sounddevice]"
]

# Advanced ASR providers
advanced-asr = [
    "openai-whisper>=20230314",
    "torch>=1.13.0",  # Required by Whisper
    "torchaudio>=0.13.0"  # Required by Whisper
]
# sherpa-onnx ASR (ARCH-10): the alphacep VOSK Zipformer2 ONNX family (RU) + Moonshine (EN). NO torch.
# Per-arch version split lives in the PEP 508 markers (uv evaluates them per build target):
#   - armv7 (WB7): 1.12.36 — the smallest sherpa that supports Moonshine's merged .ort decoder (needed
#     for the EN ASR) and still supports the RU vosk Zipformer2. Its wheel bundles onnxruntime and self-
#     contains the native libs. Newer sherpa wheels fail on the WB7 out of the box (ELF alignment + a
#     GLIBCXX bump) — `docker/Dockerfile.armv7` fixes both (bookworm base + patch_onnx_align.py); see
#     BUG-14. This one pin serves both the RU and EN armv7 images (config selects the model).
#   - everything else (x86_64 / aarch64 / win_amd64 / macos): latest. Since 1.13 the native libraries
#     (onnxruntime + the C-API .so) ship in a SEPARATE `sherpa-onnx-core` wheel; without it the
#     extension can't load `libonnxruntime.so` (it is NOT bundled in the main wheel any more). Pull both
#     with matching markers — this is what made sherpa work on 64-bit/Windows, not just armv7.
asr-onnx = [
    "sherpa-onnx==1.12.36; platform_machine=='armv7l'",
    "sherpa-onnx>=1.13; platform_machine!='armv7l'",
    "sherpa-onnx-core>=1.13; platform_machine!='armv7l'",
]

# Enhanced audio input with cloud providers
audio-input-enhanced = [
    "irene-voice-assistant[audio-input,cloud-asr]"
]

# Complete audio input with all ASR providers
audio-input-complete = [
    "irene-voice-assistant[audio-input,cloud-asr,advanced-asr]"
]

# TTS output — split per-provider (B). silero needs torch (pulled as the CPU wheel via the
# [tool.uv.index]/[tool.uv.sources] pin below); the others are self-contained. Umbrella `tts` kept.
tts-silero = [
    "torch>=1.13.0",
]
tts-pyttsx = [
    "pyttsx3>=2.90",
]
tts-elevenlabs = [
    "elevenlabs>=1.0.3",
    "httpx>=0.25.0",
]
tts-vosk = [
    "vosk-tts>=0.3.0",  # VOSK TTS for high-quality Russian multi-speaker synthesis
]
tts = [
    "irene-voice-assistant[tts-pyttsx,tts-elevenlabs,tts-vosk,tts-silero]"
]

# Audio output components. ARCH-20: streamable-only backends — sounddevice (RawOutputStream, cross-OS),
# aplay (ALSA stdin, Linux), miniaudio (self-contained, bundled WASAPI/CoreAudio/ALSA, cross-OS incl. RPi).
# Dropped audioplayer (file-only) + simpleaudio (archived, WAV-buffer-only) — neither can stream raw PCM.
audio-miniaudio = [
    "miniaudio>=1.59",
]
# Umbrella: the two output backends + librosa (resampling helper, not owned by one provider).
# numpy dropped — it is a base dependency.
audio-output = [
    "irene-voice-assistant[audio-sounddevice,audio-miniaudio]",
    "librosa>=0.10.0",  # For high-quality audio resampling in audio_helpers.py
]

# Wake word detection. 64-bit only — the WB7/armv7 satellite wakes on-device (ESP32). Two provider
# families, each its own extra (contribution principle); `voice-trigger` is the both-families umbrella.
#   openWakeWord  → wake-onnx  (ONNX runtime, no torch)
#   microWakeWord → wake-tflite (pymicro-wakeword: micro frontend + bundled tflite C lib; ESP32-unified)
wake-onnx = [
    # numpy + aiohttp are base dependencies — not re-listed here (CR-C4: avoid drifting version floors).
    "openwakeword>=0.6.0",
    "onnxruntime>=1.15.0",
]
# pymicro-wakeword ships wheels for x86_64 / aarch64 / win_amd64 / macos — NO armv7 (which is correct:
# the WB7 wakes on-device on the ESP32, never server-side here). The marker keeps the extra installable
# on armv7 (it just resolves to nothing there) instead of failing on a missing wheel.
wake-tflite = [
    # numpy + aiohttp are base dependencies — not re-listed here (CR-C4).
    "pymicro-wakeword>=2.0.0; platform_machine != 'armv7l'",
]
# microVAD (pymicro-vad) — the 'microvad' VAD engine; self-contained (bundles model + tflite C lib),
# shares the micro frontend with wake-tflite. pymicro-vad ships wheels for **Linux x86_64/aarch64 only**
# (no Windows/macOS/armv7), so the marker scopes it there; on other targets use energy or silero VAD.
vad-tflite = [
    "pymicro-vad>=2.0.0; sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')",
]
voice-trigger = [
    "irene-voice-assistant[wake-onnx,wake-tflite]",
]

# Web API components
web-api = [
    "fastapi>=0.100.0",
    # plain uvicorn: [standard] pulls uvloop/httptools/watchfiles (C/Rust) with no armv7 wheels →
    # source builds that hang/fail under QEMU. WS still works via the `websockets` dep below.
    "uvicorn>=0.20.0",
    "websockets>=11.0.0",
    "python-multipart>=0.0.6",  # Required for file uploads in Audio/ASR endpoints
]

# Cloud ASR components
cloud-asr = [
    "google-cloud-speech>=2.20.0",
    "google-auth>=2.17.0",
]

# LLM components — split per-provider (B). deepseek reuses llm-openai (OpenAI-compatible client).
llm-openai = [
    "openai>=1.0.0",
]
llm-anthropic = [
    "anthropic>=0.25.0",
]
llm = [
    "irene-voice-assistant[llm-openai,llm-anthropic]"
]

# NLU spaCy — the LIB lives in this extra; the LANGUAGE MODELS stay as raw direct-URL specs (returned
# in-code by the spaCy provider) so the build can trim them per-config via derive_build_reqs `_spacy_keep`.
# The provider returns ["nlu-spacy", <model URLs>]: derive routes the extra-name to uv, the URLs to pip-specs.
nlu-spacy = [
    "spacy>=3.8.0",
]
# Umbrella with all models — for the `voice` dev group (`uv sync`); the trimmed Docker build path uses
# the provider's raw model specs instead. numpy dropped — it is a base dependency.
nlu = [
    "irene-voice-assistant[nlu-spacy]",
    # Phase 1: Multi-language model support - Russian models (in preference order)
    "ru_core_news_md @ https://github.com/explosion/spacy-models/releases/download/ru_core_news_md-3.8.0/ru_core_news_md-3.8.0-py3-none-any.whl",
    "ru_core_news_sm @ https://github.com/explosion/spacy-models/releases/download/ru_core_news_sm-3.8.0/ru_core_news_sm-3.8.0-py3-none-any.whl",
    # Phase 1: Multi-language model support - English models (in preference order)
    "en_core_web_md @ https://github.com/explosion/spacy-models/releases/download/en_core_web_md-3.8.0/en_core_web_md-3.8.0-py3-none-any.whl",
    "en_core_web_sm @ https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl"
]

# Text processing and multilingual support.
# Number→words normalization uses ovos-number-parser (the maintained OpenVoiceOS successor of the
# abandoned MycroftAI lingua-franca — QUAL-13/ASSET-3, 2026-06-03). Pure-Python (no armv7 wheel
# concern), ru+en. Optional: irene/utils/text_processing.py keeps a pure-Python Russian fallback
# (num_to_text_ru) so the ru path works even without this extra installed.
text-multilingual = [
    "ovos-number-parser>=0.5.1",
    "runorm>=0.1.0",
    "eng-to-ipa>=0.0.2",
]

# Russian stress/homograph accentor for the `piper_ruaccent` TTS provider (ARCH-24 T2/PR3).
# 64-bit ONLY: ruaccent pulls onnxruntime + transformers, and onnxruntime has no armv7 wheel —
# the marker keeps it off the armv7 image (it resolves to nothing there, like pymicro). The plain
# `piper` provider remains the armv7 TTS.
tts-ruaccent = [
    "ruaccent>=1.5.8; platform_machine != 'armv7l'",
]

# Note: wake-word-training dependencies moved to separate project

# Development dependencies — single opt-in source (install via `--extra dev`).
# Consolidated 2026-06-04: the former [dependency-groups].dev (PEP 735, auto-installed
# by uv) duplicated mypy and split the toolchain; folded its type stubs in here so a
# bare `uv sync` is runtime-only and `--extra dev` is the complete dev toolchain.
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=5.0.0",  # TEST-7: coverage measurement is a mandatory part of the suite rewrite
    # The runtime CPython here is built WITHOUT the stdlib `_sqlite3` extension, which coverage.py
    # requires. Mirror wb-mqtt-bridge: ship pysqlite3-binary and alias it onto `sqlite3` (see the
    # root conftest.py). Self-contained — bundles its own SQLite, no system dependency.
    "pysqlite3-binary>=0.5.0",
    "black>=22.0.0",
    "isort>=5.0.0",
    "flake8>=4.0.0",
    "mypy==1.15.0",  # Pinned to match wb-mqtt-bridge version
    "pyright==1.1.410",  # QUAL-4: pinned — the standard-mode gate; diagnostics vary by version
    "import-linter>=2.0",  # ARCH-5: enforce the hexagon import contracts
    # QUAL-32 / Invariant #9: the no-TYPE_CHECKING AST gate, now upstream (extracted from this repo).
    # Pinned — diagnostics/behaviour are an explicit-bump choice. Provides `check-no-type-checking` on PATH.
    "py-dev-gates @ git+https://github.com/droman42/py-dev-gates@v0.1.1",
    # type stubs (were in [dependency-groups].dev)
    "types-beautifulsoup4>=4.12.0.20250516",
    "types-pillow>=10.2.0.20240822",
    "types-pyyaml>=6.0.12.20250516",
    "types-requests>=2.32.4.20250611",
    "types-setuptools>=80.9.0.20250801",
    "types-urllib3>=1.26.25.14",
]

# Convenience groups - Fixed: Re-enabled with proper dependencies
# Full voice assistant
voice = [
    "irene-voice-assistant[audio-input,tts,audio-output,voice-trigger,nlu,web-api,text-multilingual]"
]

# API server only
api = [
    "irene-voice-assistant[web-api]"
]

# Headless mode (text processing only) — base deps only (config-writing folded into core; CR-B10).
headless = []

# All optional components - Fixed: Re-enabled
all = [
    # BUILD-9: `all` must be genuinely all (CI type-checks the full provider surface with
    # `pip install .[all,dev]`). Previously missed tts-ruaccent + vad-tflite (pyright
    # missing-import failures) and the api/headless/audio-input-* umbrella aliases.
    "irene-voice-assistant[voice,cloud-asr,advanced-asr,asr-onnx,llm,tts-ruaccent,vad-tflite,api,headless,audio-input-complete,audio-input-enhanced]"
]

[project.scripts]
# Configuration and build management tools
irene-config-validate = "irene.tools.config_validator_cli:main"
irene-build-analyze = "irene.tools.build_analyzer:main"
irene-dependency-validate = "irene.tools.dependency_validator:main"

# Trace recording + replay (ARCH-19) — also covers the old VAD-recording workflow
# (capture_level=segmenter on a mic session → read vad_frames, then replay to tune)
irene-replay-trace = "irene.tools.replay_trace:main"

# Main runners
irene-cli = "irene.runners.cli:run_cli"
irene-webapi = "irene.runners.webapi_runner:run_webapi"
irene-voice = "irene.runners.voice_runner:run_voice"

