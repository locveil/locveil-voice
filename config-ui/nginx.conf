# config-ui static serving (BUILD-9 D-4). SPA fallback + long-cache hashed assets.
# No backend proxy: the browser calls Irene directly (permissive CORS); the API base
# comes from /runtime-config.js, written by the entrypoint from API_BASE_URL.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config must never be cached — it is the deploy-time knob.
    location = /runtime-config.js {
        add_header Cache-Control "no-store";
    }

    # Hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
