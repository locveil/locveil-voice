---
# Deploy the ESP32 fleet-provisioning plane (ARCH-22 Plane B) on the Wirenboard controller.
# Idempotent: creates the layout, installs the scripts, inits the CA ONCE (guarded on ca.key),
# templates + enables the nginx site, validates and reloads nginx. Never overwrites an existing CA.
#
#   ansible-playbook -i inventory.ini deploy.yml
- name: ESP32 fleet-provisioning plane
  hosts: esp32_controller
  become: true

  vars:
    esp32_web_root: /srv
    esp32_srv_dir: /srv/esp32
    esp32_ca_dir: /etc/esp32-ca
    nginx_user: www-data

  tasks:
    # Assert, never install (BUG-31). The controller's nginx serves the WB admin UI, and it is
    # `nginx-extras` without the `nginx` metapackage — so `apt: state=present` on `nginx` resolves
    # the metapackage and drags a version-matched upgrade of nginx-extras + openssl + the module
    # packages, restarting the admin UI. Deploying this plane must never upgrade the host's nginx.
    - name: Probe nginx and openssl on the controller
      ansible.builtin.command: "{{ item }}"
      loop:
        - nginx -V
        - openssl version
      register: esp32_probe
      changed_when: false
      failed_when: false
      check_mode: false        # read-only probe: must run even under --check, or the assert below sees nothing

    - name: Assert nginx + openssl are present, with the WebDAV module the bootstrap zone needs
      ansible.builtin.assert:
        that:
          - esp32_probe.results[0].rc == 0
          - esp32_probe.results[1].rc == 0
          - "'--with-http_dav_module' in esp32_probe.results[0].stderr"
        fail_msg: >-
          This plane needs nginx (built with --with-http_dav_module, e.g. nginx-extras) and openssl,
          already installed on the controller. The :8081 bootstrap zone accepts the device CSR over
          WebDAV PUT, so a build without http_dav_module passes `nginx -t` and then 405s at runtime.
          Install them yourself (`apt install nginx-extras openssl`) — this playbook deliberately does
          not manage packages, because the same nginx serves the Wirenboard admin UI (BUG-31).
        success_msg: "nginx (with http_dav_module) + openssl present — packages left untouched."

    - name: Ensure nginx is started and enabled on boot
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Create the private CA directory
      ansible.builtin.file:
        path: "{{ esp32_ca_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Create the web roots
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ esp32_srv_dir }}/provision/pending", owner: "{{ nginx_user }}", group: "{{ nginx_user }}", mode: "0755" }
        - { path: "{{ esp32_srv_dir }}/provision/cert",    owner: "root",             group: "{{ nginx_user }}", mode: "0755" }
        - { path: "{{ esp32_srv_dir }}/firmware",          owner: "root",             group: "{{ nginx_user }}", mode: "0755" }
        - { path: "{{ esp32_srv_dir }}/models",            owner: "root",             group: "{{ nginx_user }}", mode: "0755" }

    # The operator CLI installs WITHOUT the .sh — it is the documented command (`esp32-provision approve
    # <client_id>`, README + esp32_satellite.md D-17 + the script's own usage line). BUG-32. The two internal
    # helpers keep their extension: both are invoked by absolute path (by this play, and by esp32-provision).
    - name: Install the provisioning scripts
      ansible.builtin.copy:
        src: "files/{{ item.src }}"
        dest: "/usr/local/bin/{{ item.dest }}"
        owner: root
        group: root
        mode: "0755"
      loop:
        - { src: esp32-ca-init.sh,   dest: esp32-ca-init.sh }
        - { src: esp32-sign-csr.sh,  dest: esp32-sign-csr.sh }
        - { src: esp32-provision.sh, dest: esp32-provision }

    - name: Remove the mis-named operator CLI left by a pre-BUG-32 deploy
      ansible.builtin.file:
        path: /usr/local/bin/esp32-provision.sh
        state: absent

    - name: Initialise the home CA + server cert (once)
      ansible.builtin.command: /usr/local/bin/esp32-ca-init.sh
      environment:
        CA_DIR: "{{ esp32_ca_dir }}"
        SRV_DIR: "{{ esp32_srv_dir }}"
        CA_CN: "{{ esp32_ca_cn }}"
        SERVER_CN: "{{ esp32_server_name.split() | first }}"
        SERVER_SANS: "{{ esp32_server_sans }}"
      args:
        creates: "{{ esp32_ca_dir }}/ca.key"

    - name: Template the nginx site
      ansible.builtin.template:
        src: templates/esp32-site.conf.j2
        dest: /etc/nginx/sites-available/esp32.conf
        owner: root
        group: root
        mode: "0644"
      notify: reload nginx

    - name: Enable the nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/esp32.conf
        dest: /etc/nginx/sites-enabled/esp32.conf
        state: link
      notify: reload nginx

  handlers:
    - name: reload nginx
      ansible.builtin.shell: nginx -t && systemctl reload nginx
      changed_when: true
