# System tests: the shipped streaming-ASR endpoint /ws/audio (ARCH-10, irene/runners/webapi_router.py).
# PURE YAML — all execution logic lives in ../../eval-commons. Run via the Makefile so the
# (target × config) axes and the project venv are wired for you:
#
#   make ws TARGET=local          # against a locally-running Irene
#   make ws TARGET=wb7            # against Irene on the WB7 controller (remote)
#   make ux TARGET=local          # only the DeepSeek-judged UX cases (needs DEEPSEEK_API_KEY)
#
# The endpoint is injected from the target profile via {{env.WS_AUDIO_URL}} — never hard-coded
# (promptfoo resolves {{env.VAR}} at config-load time). The config the SUT runs is an EXTERNAL
# axis (Makefile bring-up / what's deployed on WB7); these tests are config-agnostic.

description: wb-mqtt-voice — streaming ASR + Russian conversational UX (system tests over /ws/audio)

# The rendered prompt handed to the provider is just the audio fixture path for each case.
prompts:
  - '{{audio}}'

providers:
  - id: file://../../eval-commons/eval_commons/providers/ws_audio_provider.py
    label: ws-audio
    config:
      ws_url: "{{ env.WS_AUDIO_URL | default('ws://localhost:6000/ws/audio') }}"
      room_name: Кухня
      sample_rate: 16000
      mode: streaming
      return_mode: full          # output = JSON {transcript, response_text, intent_name, success, ...}

# Every llm-rubric / g-eval assertion is graded by DeepSeek, wired once here.
defaultTest:
  options:
    provider:
      file://../../eval-commons/shared/deepseek-judge.yaml

tests:
  # ── 1. ASR transcript accuracy (deterministic, WER via jiwer) ──────────────────
  - description: ASR accuracy — «поставь таймер на десять минут»
    metadata: { kind: system }
    vars:
      audio: fixtures/timer_10min.wav
      reference: поставь таймер на десять минут
      wer_threshold: 0.15
    assert:
      - type: python
        value: file://../../eval-commons/eval_commons/assertions/wer_scorer.py

  # ── 2. Intent recognition (deterministic, parse the full-JSON output) ──────────
  - description: Intent — timer set is recognized
    metadata: { kind: system }
    vars:
      audio: fixtures/timer_10min.wav
    assert:
      - type: is-json
      # TODO: confirm the exact intent name Irene's timer handler emits (placeholder 'timer.set').
      - type: javascript
        value: JSON.parse(output).intent_name === 'timer.set' && JSON.parse(output).success === true

  # ── 3. Conversational UX (LLM-as-human judge: DeepSeek) ────────────────────────
  #   transform extracts the user-facing reply so the judge scores the answer, not the JSON.
  - description: UX — assistant confirms the timer in natural Russian
    metadata: { kind: ux }
    vars:
      audio: fixtures/timer_10min.wav
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          Ассистент явно и однозначно подтвердил на естественном русском языке, что
          таймер установлен (например «таймер на десять минут установлен»), без
          англоязычных вставок и без сырых технических ошибок. Технические
          идентификаторы оценивать не нужно.

  # ── 4. Graceful-failure UX (unreachable device, judged on tone/clarity) ────────
  - description: UX — polite, human-readable failure when a device is unreachable
    metadata: { kind: ux }
    vars:
      audio: fixtures/light_unreachable.wav
      # `reference` here is the line to SPEAK when recording this fixture (the recorder reads it);
      # this is a judge case, so nothing asserts WER against it. Target a device that is unreachable
      # in the SUT's config. TODO: confirm against a live run that this stays unreachable.
      reference: включи свет в гараже
    assert:
      - type: llm-rubric
        transform: JSON.parse(output).response_text
        value: >
          Когда действие невозможно, ассистент вежливо и понятно сообщает о проблеме на
          русском языке, не выдаёт трейсбек или сырую ошибку, и по возможности предлагает
          следующий шаг. Пройдено, если сообщение доброжелательно и человекочитаемо.
