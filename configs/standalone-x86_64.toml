# ============================================================
# IRENE — x86_64 STANDALONE (full local voice runner)  (ARCH-24 / BUILD-3)
# ============================================================
# The lone NON-satellite target: a self-contained desktop/server voice assistant that owns the WHOLE
# pipeline locally — mic → VAD → wake-word → ASR → NLU → intent → TTS → playback. The ONE torch image
# (torch is contained here; the ARM satellites are torch-free sherpa). Canonical matrix: §5 of
# docs/design/torch_free_armv7_voice.md.
#   ASR = whisper (torch), model_size=small      TTS = silero_v4 (torch), voice=baya
#   NLU = keyword → spaCy(md) → llm cascade      VAD = silero,  wake-word = openwakeword
#
# This is the image's BAKED DEFAULT. The x86_64 image is built with the full dependency set, so a
# mounted/env config override (handled by the image entrypoint) can reach ANY provider — change models,
# voices, providers at runtime without rebuilding.

name = "Irene"
debug = false
log_level = "INFO"

language = "ru"
default_language = "ru"            # canonical source of truth (legacy `language` kept for back-compat)
supported_languages = ["ru"]      # Russian-only deployment (auto-detect OFF below)
max_concurrent_commands = 10
command_timeout_seconds = 30.0
context_timeout_minutes = 30

# ============================================================
# SYSTEM CAPABILITIES — full local hardware
# ============================================================
[system]
microphone_enabled = true       # local mic → VAD is required to segment the raw chunk stream
audio_playback_enabled = true   # local speaker
web_api_enabled = true
web_port = 8080
metrics_enabled = false
metrics_port = 9090

# ============================================================
# INPUT SOURCES
# ============================================================
[inputs]
microphone = true
web = true
cli = true
default_input = "microphone"

[inputs.microphone_config]
enabled = true
sample_rate = 16000
channels = 1
chunk_size = 1024

[inputs.web_config]
enabled = true
websocket_enabled = true
rest_api_enabled = true

[inputs.cli_config]
enabled = true
prompt_prefix = "irene> "
history_enabled = true

# ============================================================
# OUTPUT CHANNELS (defaults made explicit; ARCH-8 bridge surface)
# ============================================================
[outputs]
console = true                      # Console (terminal) text output (CLI channel)
web_push = true                     # Browser push channel (/ws/output) for deferred results

[outputs.bridge]
# Smart-home actuation via locveil-bridge (ARCH-8). Flip on when the bridge is
# deployed and reachable from this instance (hardware bring-up, ARCH-25).
enabled = false
base_url = "http://localhost:8000"  # locveil-bridge REST API
timeout_seconds = 20.0

# ============================================================
# COMPONENT ENABLEMENT — everything on (full experience)
# ============================================================
[components]
asr = true
nlu = true
intent_system = true
tts = true
llm = true
text_processor = true
audio = true                    # local playback
voice_trigger = true            # local wake-word
configuration = true
monitoring = true
nlu_analysis = true

# ============================================================
# ASR — Whisper (torch), small model
# ============================================================
[asr]
enabled = true
default_provider = "whisper"
fallback_providers = []

[asr.providers.whisper]
enabled = true
model_size = "small"               # tiny | base | small | medium | large — small = good RU accuracy on CPU
device = "cpu"                     # "cuda" if a GPU is available
default_language = "ru"
no_speech_threshold = 0.6
preload_models = true

# ============================================================
# TTS — Silero v4 (torch), voice baya
# ============================================================
[tts]
enabled = true
default_provider = "silero_v4"
fallback_providers = ["console"]

[tts.providers.silero_v4]
enabled = true
default_speaker = "baya"           # ru female (matches the satellites' female persona)
sample_rate = 48000
torch_device = "cpu"
preload_models = true

[tts.providers.console]
enabled = true
color = "blue"
style = "console"
format = "txt"

# ============================================================
# AUDIO — local playback (real speaker)
# ============================================================
[audio]
enabled = true
default_provider = "sounddevice"
fallback_providers = ["console"]
concurrent_playback = false

[audio.providers.sounddevice]
enabled = true

[audio.providers.console]
enabled = true
color = "green"

# ============================================================
# LLM — deepseek (NLU classifier + conversation); console floor
# ============================================================
[llm]
enabled = true
default_provider = "deepseek"
fallback_providers = ["console"]

[llm.providers.deepseek]
enabled = true
api_key = "${DEEPSEEK_API_KEY:-}"
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
max_tokens = 8000
context_window = 64000
timeout = 30

[llm.providers.console]
enabled = true

# ============================================================
# VOICE TRIGGER — microWakeWord («Ирина», the released RU catalog
# word — pack fetched from HF via the asset manager; same "micro"
# stack the ESP32 satellites run on-device)
# ============================================================
[voice_trigger]
enabled = true
default_provider = "microwakeword"
confidence_threshold = 0.8
buffer_seconds = 1.0
timeout_seconds = 5.0

[voice_trigger.providers.microwakeword]
enabled = true
sliding_window_size = 5
preload_models = true
wake_words = [
    { name = "irina", model = "irina", threshold = 0.97, language = "ru" },
]

# ============================================================
# VAD — Silero (ONNX) — segments the raw mic chunk stream
# ============================================================
[vad]
enabled = true
default_provider = "silero"
max_segment_duration_s = 8
processing_timeout_ms = 50
buffer_size_frames = 300
normalize_for_asr = true
asr_target_rms = 0.15
enable_fallback_to_original = true

[vad.providers.silero]
threshold = 0.5
voice_duration_ms = 50
silence_duration_ms = 300

[vad.providers.energy]
threshold = 0.01                   # fallback VAD (pure-python)

# ============================================================
# NLU — keyword → spaCy(md) → llm cascade
# ============================================================
[nlu]
enabled = true
default_provider = "hybrid_keyword_matcher"
confidence_threshold = 0.7
fallback_intent = "conversation.general"
provider_cascade_order = ["hybrid_keyword_matcher", "spacy_nlu", "llm"]
max_cascade_attempts = 4
cascade_timeout_ms = 200
cache_recognition_results = false
cache_ttl_seconds = 300
auto_detect_language = false        # Russian-only deployment — language is fixed by config
language_detection_confidence_threshold = 0.8
persist_language_preference = true

[nlu.providers.hybrid_keyword_matcher]
enabled = true
confidence_threshold = 0.7
fuzzy_enabled = true
fuzzy_threshold = 0.8
pattern_confidence = 0.9
case_sensitive = false
normalize_unicode = true
cache_fuzzy_results = true
max_fuzzy_keywords_per_intent = 50
min_pattern_length = 2

[nlu.providers.spacy_nlu]
enabled = true
confidence_threshold = 0.7
entity_types = ["PERSON", "ORG", "GPE", "DATE", "TIME", "MONEY", "QUANTITY"]

[nlu.providers.spacy_nlu.language_preferences]
ru = ["ru_core_news_md", "ru_core_news_sm"]   # mid-size model (the x86 box has the room)
en = ["en_core_web_md", "en_core_web_sm"]

[nlu.providers.llm]
enabled = true
confidence_threshold = 0.7
max_phrases_per_intent = 3

# ============================================================
# TEXT PROCESSING
# ============================================================
[text_processor]
enabled = true
stages = ["asr_output", "tts_input"]     # the two real stages (informational; chains below)

[text_processor.normalizers.numbers]
enabled = true                           # digits -> words, for SYNTHESIS
# TTS-only (BUG-23): on asr_output this fought the words->digits pre-NLU normalization and
# corrupted alphanumerics («hdmi1» -> «hdmiодин», «25» -> «двадцать пять» -> mis-reparsed).
stages = ["tts_input"]

[text_processor.normalizers.prepare]
enabled = true                           # symbol->word, Latin->Cyrillic — for SYNTHESIS
stages = ["tts_input"]                   # TTS-only (BUG-3): at asr_output it corrupts English input
latin_to_cyrillic = true
symbol_replacement = true

# ============================================================
# INTENT SYSTEM (essential)
# ============================================================
[intent_system]
enabled = true
confidence_threshold = 0.7
fallback_intent = "conversation.general"

[intent_system.handlers]
enabled = ["conversation", "greetings", "timer", "datetime", "system", "text_enhancement_handler", "smart_home", "report"]
disabled = []
auto_discover = true
discovery_paths = ["irene.intents.handlers"]

[intent_system.handlers.asset_validation]
strict_mode = true
validate_spacy_patterns = false
validate_json_schema = true

[intent_system.handlers.conversation]
session_timeout = 1800
max_sessions = 50
max_context_length = 10
default_conversation_confidence = 0.6

[intent_system.handlers.timer]
min_seconds = 1
max_seconds = 86400

[intent_system.handlers.datetime]
timezone = ""
date_format = "%Y-%m-%d"
time_format = "%H:%M:%S"

[intent_system.handlers.greetings]
personalized = true
context_aware = true

[intent_system.handlers.system]
allow_shutdown = false
allow_restart = false
info_detail_level = "basic"

# ============================================================
# MONITORING (full image — kept on)
# ============================================================
[monitoring]
enabled = true
metrics_enabled = true
dashboard_enabled = true
notifications_enabled = true
debug_tools_enabled = true
memory_management_enabled = true
notifications_default_channel = "log"
notifications_tts_enabled = true
notifications_web_enabled = true
metrics_monitoring_interval = 300
metrics_retention_hours = 24
memory_cleanup_interval = 1800
memory_aggressive_cleanup = false
debug_auto_inspect_failures = true
debug_max_history = 1000
analytics_dashboard_enabled = true

# ============================================================
# NLU ANALYSIS (full image — kept on)
# ============================================================
[nlu_analysis]
enabled = true

[nlu_analysis.conflict_detector]
blocker_threshold = 0.8
warning_threshold = 0.6
info_threshold = 0.4

[nlu_analysis.scope_analyzer]
cross_domain_threshold = 0.7
breadth_threshold = 0.8

[nlu_analysis.report_generator]
max_suggestions_per_conflict = 5
include_technical_details = true

[nlu_analysis.hybrid_analyzer]
fuzzy_threshold = 0.8
pattern_confidence = 0.9
detect_keyword_collisions = true
detect_pattern_explosion = true
detect_performance_issues = true

[nlu_analysis.spacy_analyzer]
similarity_threshold = 0.8
semantic_analysis_enabled = true
entity_analysis_enabled = true
pattern_validation_enabled = true

[nlu_analysis.performance]
max_analysis_time_ms = 5000.0
max_concurrent_analyses = 3
enable_caching = true
cache_ttl_seconds = 300

[nlu_analysis.languages]
supported_languages = ["ru", "en"]
language_detection_threshold = 0.8

# ============================================================
# WORKFLOWS — unified voice assistant (full pipeline)
# ============================================================
[workflows]
enabled = ["unified_voice_assistant"]
default = "unified_voice_assistant"

[workflows.unified_voice_assistant]
voice_trigger_enabled = true
asr_enabled = true
text_processing_enabled = true
nlu_enabled = true
intent_execution_enabled = true
llm_enabled = true
tts_enabled = true
audio_enabled = true
monitoring_enabled = true
sample_rate = 16000
channels = 1
validate_audio_compatibility = true
enable_vad_processing = true       # local mic → segment the raw chunk stream
default_source = "voice"
default_language = "ru"
session_timeout_minutes = 30

[workflows.unified_voice_assistant.audio_validation]
enabled = true
fatal_on_conflicts = true
auto_resolve_defaults = true
log_resolution_details = true

# ============================================================
# TRACE — per-request traces (ARCH-19). OFF by default; --trace to enable.
# ============================================================
[trace]
enabled = false
capture_level = "utterance"

# ============================================================
# ASSET MANAGEMENT
# ============================================================
[assets]
auto_create_dirs = true
cleanup_on_startup = false
