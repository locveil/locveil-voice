# Russian conversation response templates for ConversationIntentHandler
# Phase 2: Extracted from hardcoded arrays in conversation.py

start_greetings:
  - "Давайте поговорим! О чём хотите поболтать?"
  - "Отлично! Я готова к беседе. О чём поговорим?"
  - "Хорошо, начинаем диалог. Что вас интересует?"
  - "Замечательно! Я вас слушаю."

end_farewells:
  - "До свидания! Было приятно поговорить."
  - "Пока! Обращайтесь ещё."
  - "До встречи! Хорошего дня."
  - "Всего доброго!"

clear_response: "Хорошо, начинаем диалог заново. О чём поговорим?"

# Fallback responses when LLM is unavailable
fallback_no_llm_responses:
  - "Я не смогла понять ваш запрос '{original_text}'. Попробуйте переформулировать или использовать более конкретные команды."
  - "Извините, не могу обработать '{original_text}'. Попробуйте спросить по-другому или используйте конкретные команды."
  - "Не понимаю что означает '{original_text}'. Пожалуйста, переформулируйте ваш запрос более ясно."
  - "Ваш запрос '{original_text}' мне непонятен. Попробуйте использовать более простые или конкретные фразы."

fallback_help_suggestions:
  - "Вы можете спросить о времени, поставить таймер, попросить информацию о системе или поздороваться."
  - "Попробуйте команды вроде 'сколько времени', 'поставь таймер на 5 минут', 'как дела' или 'помощь'."
  - "Доступны команды: время, таймер, приветствие, информация о системе и другие."

# QUAL-37: targeted no-intent clarification (deterministic, offline) when the NLU guessed a domain.
fallback_targeted: "Возможно, вы хотели {action}? Если нет, попробуйте переформулировать запрос."

# QUAL-71: degradation/error speech — externalized (was hardcoded RU in conversation.py,
# invisible to localization; an EN session got Russian errors)
err_dialog_error: "Извините, произошла ошибка в обработке диалога."
err_reference_unavailable: "Извините, справочный режим недоступен."
err_reference_failed: "Извините, не удалось получить справочную информацию."
err_chat_unavailable: "Извините, диалоговый режим недоступен."
err_dialog_retry: "Извините, произошла ошибка в диалоге. Попробуйте ещё раз."
