# BUILD-9 — the one gated CI/publish workflow (design: docs/design/build_release_process.md).
# Replaces backend-health.yml + frontend-health.yml + build-images.yml.
#
# Shape (bridge-aligned):
#   push/PR   → path-filtered fast gates only: ledger-guard / backend-health / frontend-health.
#   dispatch  → the SAME gates (forced for the areas being published) + image publishing:
#               a targets × languages matrix for the backend images (default: all 6) and the
#               multi-arch config-ui image — each publish job `needs:` its green health job,
#               so an image can never be published from a red tree.
#
# Naming (D-2): RU images keep the unsuffixed names (locveil-voice-armv7 …); EN adds `-en`.
# Guards (D-6): a published image FAILS the run if /app/assets is non-empty (models must
# never be baked) and its size is reported + checked against a per-target budget.
#
# Publish everything:  gh workflow run CI            (defaults: all targets × both languages + UI)
# One image:           gh workflow run CI -f targets=armv7 -f languages=en -f build_ui=false

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      targets:
        description: "Backend targets to publish"
        type: choice
        options: [all, armv7, aarch64, standalone]
        default: all
      languages:
        description: "Languages to publish"
        type: choice
        options: [all, ru, en]
        default: all
      build_backend:
        description: "Publish backend images"
        type: boolean
        default: true
      build_ui:
        description: "Publish the config-ui image (locveil-voice-ui, multi-arch)"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  # Event name in the key so a push never cancels a manual publish dispatch.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # What changed? A commit only pays for the checks it earns.           #
  # ------------------------------------------------------------------ #
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      ledger: ${{ steps.filter.outputs.ledger }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'irene/**'
              - 'configs/**'
              - 'docker/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            ui:
              - 'config-ui/**'
              - '.github/workflows/ci.yml'
            ledger:
              - 'docs/**'
              - 'scripts/check_scope.py'
              - '.github/workflows/ci.yml'

  # ------------------------------------------------------------------ #
  # Ledger guard — single-task-ledger discipline, enforced in CI.       #
  # ------------------------------------------------------------------ #
  ledger-guard:
    needs: changes
    if: needs.changes.outputs.ledger == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scope drift guard (check_scope.py)
        run: python3 scripts/check_scope.py

  # ------------------------------------------------------------------ #
  # Backend health — shared py-dev-gates trio + the voice-specific      #
  # gate suite + pytest. Gates every backend image publish.             #
  # ------------------------------------------------------------------ #
  backend-health:
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Shared gates (import-linter + check-no-type-checking + pyright), same composite
      # action the bridge uses. Installs the project with pip; `all` pulls every provider
      # extra so pyright can type-check the full provider surface.
      - name: Python health gates (py-dev-gates)
        uses: droman42/py-dev-gates/.github/actions/python-health@v0.1.1
        with:
          src: irene
          install-extras: "all,dev"
          # Explicit: the repo's .python-version is a gitignored LOCAL pin (absent in CI),
          # and the action falls back to reading it when no version is given.
          python-version: "3.11"

      # The lockfile is still the source of truth for reproducible installs even though
      # the gate env above is pip-resolved — verify it hasn't drifted from pyproject.
      - name: Lockfile consistency (uv lock --check)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv lock --check

      - name: Build-analyzer profile validation
        run: python -m irene.tools.build_analyzer --validate-all-profiles

      - name: Config validation (master + profiles)
        run: python -m irene.tools.config_validator_cli --config-dir configs/ --ci-mode

      # QUAL-67: donation schema + contract↔code wiring, warnings-as-errors — every declared
      # param must be read, every _handle_* method declared. The QUAL-66 zero-warning
      # baseline is what makes warnings failable here.
      - name: Donation validation (schema + contract wiring, warnings-as-errors)
        run: python -m irene.tools.donation_validator_cli --ci-mode

      - name: Dependency validation (providers x platforms)
        run: python -m irene.tools.dependency_validator --validate-all --platforms linux.ubuntu,linux.alpine

      - name: Architecture gate — armv7 profile stays torch-free (ARCH-24 T3)
        run: python -m irene.tools.build_analyzer --config configs/embedded-armv7.toml --arch armv7l

      - name: Tests
        run: python -m pytest irene/tests/ -q

  # ------------------------------------------------------------------ #
  # Frontend health — gates the config-ui image publish.                #
  # ------------------------------------------------------------------ #
  frontend-health:
    needs: changes
    if: >-
      needs.changes.outputs.ui == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: config-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: config-ui/package-lock.json
      - run: npm ci
      - name: Type-check + lint + orphans
        run: npm run check
      - name: Build
        run: npm run build
      - name: Tests
        run: npm run test

  # ------------------------------------------------------------------ #
  # Publish plan — expand the dispatch inputs into the build matrix.    #
  # ------------------------------------------------------------------ #
  plan:
    if: github.event_name == 'workflow_dispatch' && inputs.build_backend
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        shell: python
        run: |
          import json, os

          TARGETS = {
              "armv7":      {"dockerfile": "docker/Dockerfile.armv7",   "platform": "linux/arm/v7",
                             "profile": "embedded-armv7",   "image": "locveil-voice-armv7"},
              "aarch64":    {"dockerfile": "docker/Dockerfile.aarch64", "platform": "linux/arm64",
                             "profile": "embedded-aarch64", "image": "locveil-voice-aarch64"},
              "standalone": {"dockerfile": "docker/Dockerfile.x86_64",  "platform": "linux/amd64",
                             "profile": "standalone-x86_64", "image": "locveil-voice-standalone"},
          }
          # D-6 size budgets (bytes, uncompressed) — set from the FIRST real publish
          # (BUILD-11, 2026-07-06): armv7 248 MB, aarch64 718 MB, standalone 2.86 GB.
          # Roughly 2x/1.4x headroom for dependency growth; a breach means a silent
          # multi-hundred-MB regression, not normal drift.
          BUDGETS = {"armv7": 500_000_000, "aarch64": 1_500_000_000, "standalone": 4_000_000_000}

          want_targets = "${{ inputs.targets }}"
          want_langs = "${{ inputs.languages }}"
          targets = list(TARGETS) if want_targets == "all" else [want_targets]
          languages = ["ru", "en"] if want_langs == "all" else [want_langs]

          include = []
          for t in targets:
              base = TARGETS[t]
              for lang in languages:
                  # D-2: RU keeps the unsuffixed names/profiles; EN adds `-en`.
                  suffix = "" if lang == "ru" else "-en"
                  include.append({
                      "target": t, "language": lang,
                      "dockerfile": base["dockerfile"], "platform": base["platform"],
                      "profile": base["profile"] + suffix, "image": base["image"] + suffix,
                      "budget": BUDGETS[t],
                  })
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps({"include": include}) + "\n")

  # ------------------------------------------------------------------ #
  # Backend images — manual only, gated on green backend-health.        #
  # ------------------------------------------------------------------ #
  publish-backend:
    needs: [backend-health, plan]
    if: github.event_name == 'workflow_dispatch' && inputs.build_backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}

      - name: Build + push (${{ matrix.target }}/${{ matrix.language }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            CONFIG_PROFILE=${{ matrix.profile }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.language }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.language }}

      # D-6: models must NEVER be baked. The image ships an EMPTY /app/assets (all
      # ASR/TTS/wake models download at runtime into the mounted assets root); a non-empty
      # dir means someone baked assets/models — fail the publish loudly. Size is budgeted
      # so a silent multi-GB regression is caught here, not on the WB7's flash.
      - name: "Guard: no baked assets + size budget (D-6)"
        run: |
          REF="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
          docker pull --platform ${{ matrix.platform }} "$REF"

          COUNT=$(docker run --rm --platform ${{ matrix.platform }} --entrypoint sh "$REF" \
                    -c 'ls -A /app/assets | wc -l')
          echo "/app/assets entries: $COUNT"
          if [ "$COUNT" -ne 0 ]; then
            echo "::error::Image ships a non-empty /app/assets — models/assets must not be baked (D-6)"
            exit 1
          fi

          SIZE=$(docker image inspect "$REF" --format '{{.Size}}')
          SIZE_H=$(numfmt --to=iec "$SIZE")
          echo "### ${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- uncompressed size: **${SIZE_H}** (budget: $(numfmt --to=iec ${{ matrix.budget }}))" >> "$GITHUB_STEP_SUMMARY"
          echo "- /app/assets: empty ✅" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE" -gt "${{ matrix.budget }}" ]; then
            echo "::error::Image size ${SIZE_H} exceeds the ${{ matrix.target }} budget"
            exit 1
          fi

  # ------------------------------------------------------------------ #
  # config-ui image — ONE multi-arch manifest (static files are arch-   #
  # independent). Published, but not deployed to the controller (D-4).  #
  # ------------------------------------------------------------------ #
  publish-ui:
    needs: frontend-health
    if: github.event_name == 'workflow_dispatch' && inputs.build_ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/locveil-voice-ui
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}

      - name: Build + push (multi-arch manifest)
        uses: docker/build-push-action@v6
        with:
          context: config-ui
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui
